version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: meteoswiss
    main: ./cmd/meteoswiss
    binary: meteoswiss
    ldflags:
      - -s -w
      - -X '{{ .ModulePath }}/internal/meteoswiss/cmd.version={{ .Version }}'
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

  - id: whiterisk
    main: ./cmd/whiterisk
    binary: whiterisk
    ldflags:
      - -s -w
      - -X '{{ .ModulePath }}/internal/whiterisk/cmd.version={{ .Version }}'
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: ['tar.gz']
    format_overrides:
      - goos: windows
        formats: ['zip']
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - README.md

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'

brews:
  - ids:
      - meteoswiss
      - whiterisk
    repository:
      owner: salam
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/salam/meteoswisscli
    description: CLI tools for Swiss weather and avalanche data
    license: MIT
    install: |
      bin.install "meteoswiss"
      bin.install "whiterisk"
    test: |
      system "#{bin}/meteoswiss", "--version"
      system "#{bin}/whiterisk", "--version"

aurs:
  - ids:
      - meteoswiss
      - whiterisk
    homepage: https://github.com/salam/meteoswisscli
    description: CLI tools for Swiss weather and avalanche data from MeteoSwiss and SLF/WSL
    maintainers:
      - 'salam <salam@users.noreply.github.com>'
    license: MIT
    private_key: '{{ .Env.AUR_KEY }}'
    git_url: 'ssh://aur@aur.archlinux.org/meteoswisscli-bin.git'
    package: |-
      install -Dm755 meteoswiss "${pkgdir}/usr/bin/meteoswiss"
      install -Dm755 whiterisk "${pkgdir}/usr/bin/whiterisk"
      install -Dm644 LICENSE "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"

      # Shell completions
      mkdir -p "${pkgdir}/usr/share/bash-completion/completions"
      mkdir -p "${pkgdir}/usr/share/zsh/site-functions"
      mkdir -p "${pkgdir}/usr/share/fish/vendor_completions.d"
      ./meteoswiss completion bash > "${pkgdir}/usr/share/bash-completion/completions/meteoswiss"
      ./meteoswiss completion zsh > "${pkgdir}/usr/share/zsh/site-functions/_meteoswiss"
      ./meteoswiss completion fish > "${pkgdir}/usr/share/fish/vendor_completions.d/meteoswiss.fish"
      ./whiterisk completion bash > "${pkgdir}/usr/share/bash-completion/completions/whiterisk"
      ./whiterisk completion zsh > "${pkgdir}/usr/share/zsh/site-functions/_whiterisk"
      ./whiterisk completion fish > "${pkgdir}/usr/share/fish/vendor_completions.d/whiterisk.fish"

snapcrafts:
  - ids:
      - meteoswiss
      - whiterisk
    name: meteoswisscli
    summary: CLI tools for Swiss weather and avalanche data
    description: |
      Two command-line tools for Swiss weather and avalanche data, written in Go.
      meteoswiss: forecasts, radar, wind, pollen from MeteoSwiss.
      whiterisk: avalanche bulletins, snow data from SLF/WSL.
    grade: stable
    confinement: strict
    license: MIT
    apps:
      meteoswiss:
        command: meteoswiss
        plugs:
          - network
          - home
      whiterisk:
        command: whiterisk
        plugs:
          - network
          - home

release:
  github:
    owner: salam
    name: meteoswisscli
  draft: false
  prerelease: auto
