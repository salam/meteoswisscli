name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25']
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Verify dependencies
        run: go mod verify

      - name: Vet
        run: go vet ./...

      - name: Build
        run: |
          go build -o /dev/null ./cmd/meteoswiss
          go build -o /dev/null ./cmd/whiterisk

      - name: Unit tests
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Integration tests
        run: go test -v -tags=integration ./...
        env:
          INTEGRATION_TEST: "1"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.txt
        continue-on-error: true

  e2e:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build binaries
        run: make build

      - name: E2E tests
        run: go test -v -tags=e2e ./test/...
        env:
          INTEGRATION_TEST: "1"

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
        continue-on-error: true
